name: Validate with hassfest

permissions:
  contents: read

on:
  push:
  pull_request:
  schedule:
  - cron: 0 0 * * *

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - uses: home-assistant/actions/hassfest@868e6cb4607727d764341a158d98872cd63fa658 # master
