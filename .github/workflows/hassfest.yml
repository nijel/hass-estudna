name: Validate with hassfest

permissions:
  contents: read

on:
  push:
  pull_request:
  schedule:
  - cron: 0 0 * * *

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
    - uses: home-assistant/actions/hassfest@e91ad1948e57189485b9c1ad608af0c303946f89 # master
