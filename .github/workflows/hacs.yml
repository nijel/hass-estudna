name: HACS Action
permissions:
  contents: read

on:
  push:
  pull_request:
  schedule:
  - cron: 0 0 * * *

jobs:
  hacs:
    name: HACS Action
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    - name: HACS Action
      uses: hacs/action@dcb30e72781db3f207d5236b861172774ab0b485 # main
      with:
        category: integration
