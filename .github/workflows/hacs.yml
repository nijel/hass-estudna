name: HACS Action
permissions:
  contents: read

on:
  push:
  pull_request:
  schedule:
  - cron: 0 0 * * *

jobs:
  hacs:
    name: HACS Action
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
    - name: HACS Action
      uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa # main
      with:
        category: integration
