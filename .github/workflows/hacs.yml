name: HACS Action
permissions:
  contents: read

on:
  push:
  pull_request:
  schedule:
  - cron: 0 0 * * *

jobs:
  hacs:
    name: HACS Action
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
    - name: HACS Action
      uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa # main
      with:
        category: integration
